<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cartas do Jogo — Isso é Ultraprocessado?</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Baloo+2:wght@700;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.print-btn {
  text-align: center;
  margin-bottom: 24px;
}

.print-btn button {
  background: #5C35CC;
  color: white;
  border: none;
  padding: 12px 32px;
  border-radius: 50px;
  font-weight: 800;
  cursor: pointer;
}

h1 {
  font-family: 'Baloo 2', cursive;
  text-align: center;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  margin-bottom: 20px;
  color: #666;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  max-width: 900px;
  margin: auto;
}

.card {
  width: 200px;
  height: 240px;
  border-radius: 18px;
  background: #ffffff;
  border: 3px solid #ddd;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  position: relative;
}

/* IMAGENS */
.card img.emoji {
  width: 70px;
  height: 70px;
  object-fit: contain;
  margin-bottom: 10px;
}

.food-name {
  font-family: 'Baloo 2', cursive;
  font-size: 18px;
  font-weight: 800;
  color: #333;
}

.hint {
  font-size: 11px;
  margin-top: 6px;
  color: #777;
}

</style>
</head>

<body>

<div class="print-btn">
  <button onclick="window.print()">🖨️ Imprimir</button>
</div>

<h1>🃏 Isso é Ultraprocessado?</h1>
<div class="subtitle">Classifique os alimentos em grupos!</div>

<div class="cards-grid">

<!-- CARTAS -->
<div class="card">
<img src="imagens/maca.png" class="emoji">
<div class="food-name">Maçã</div>
<div class="hint">Direto do pé!</div>
</div>

<div class="card">
<img src="imagens/cenoura.png" class="emoji">
<div class="food-name">Cenoura</div>
</div>

<div class="card">
<img src="imagens/ovo.png" class="emoji">
<div class="food-name">Ovo</div>
</div>

<div class="card">
<img src="imagens/banana.png" class="emoji">
<div class="food-name">Banana</div>
</div>

<div class="card">
<img src="imagens/frango.png" class="emoji">
<div class="food-name">Frango</div>
</div>

<div class="card">
<img src="imagens/feijao.png" class="emoji">
<div class="food-name">Feijão</div>
</div>

<div class="card">
<img src="imagens/queijo.png" class="emoji">
<div class="food-name">Queijo</div>
</div>

<div class="card">
<img src="imagens/atum.png" class="emoji">
<div class="food-name">Atum</div>
</div>

<div class="card">
<img src="imagens/pao.png" class="emoji">
<div class="food-name">Pão</div>
</div>

<div class="card">
<img src="imagens/iogurte.png" class="emoji">
<div class="food-name">Iogurte</div>
</div>

<div class="card">
<img src="imagens/refrigerante.png" class="emoji">
<div class="food-name">Refrigerante</div>
</div>

<div class="card">
<img src="imagens/salgadinho.png" class="emoji">
<div class="food-name">Salgadinho</div>
</div>

<div class="card">
<img src="imagens/biscoito.png" class="emoji">
<div class="food-name">Biscoito</div>
</div>

<div class="card">
<img src="imagens/achocolatado.png" class="emoji">
<div class="food-name">Achocolatado</div>
</div>

<div class="card">
<img src="imagens/salsicha.png" class="emoji">

</div>

<div class="card">
<img src="imagens/chocolate.png" class="emoji">
<div class="food-name">Chocolate 70%</div>
<div class="hint">Analise os ingredientes!</div>
</div>

</div>

</body>
</html>
